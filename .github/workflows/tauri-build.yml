name: Tauri Build

on:
  push:
    branches: [feature/native-client]
    tags: ['v*']

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: true

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    name: Build (${{ matrix.target.label }})
    if: hashFiles('src-tauri/Cargo.toml') != ''
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: ubuntu-latest
            label: Linux
            rust-target: x86_64-unknown-linux-gnu
          - runner: macos-latest
            label: macOS
            rust-target: aarch64-apple-darwin
          - runner: windows-latest
            label: Windows
            rust-target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust-target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      # Linux: install system dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (static export)
        run: pnpm build
        env:
          TAURI_BUILD: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli@^2

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target.rust-target }}

      # Upload platform-specific artifacts
      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-chat-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-chat-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
          retention-days: 7

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-chat-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

  # On tag push: create GitHub Release with all artifacts
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="${{ github.event.head_commit.message }}"

          cat > artifacts/update-manifest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "${NOTES}",
            "pub_date": "${DATE}",
            "platforms": {
              "linux-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/bedrock-chat_${VERSION}_amd64.AppImage",
                "signature": ""
              },
              "darwin-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/bedrock-chat_${VERSION}_aarch64.dmg",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/bedrock-chat_${VERSION}_x64-setup.exe",
                "signature": ""
              }
            }
          }
          EOF

          echo "Update manifest generated for v${VERSION}"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
